<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mate</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container glass-panel">
        
        <!-- Header -->
        <header>
            <h1 class="logo-text">AI<span>Mate</span></h1>
            <p class="status-text" id="statusText">Ready to listen...</p>
            <div class="voice-selector">
                <select id="voiceSelect" class="glass-select">
                    <option value="alloy">Alloy</option>
                    <option value="ash">Ash</option>
                    <option value="ballad">Ballad</option>
                    <option value="cedar">Cedar</option>
                    <option value="coral">Coral</option>
                    <option value="echo">Echo</option>
                    <option value="fable">Fable</option>
                    <option value="marin">Marin</option>
                    <option value="nova" selected>Nova</option>
                    <option value="onyx">Onyx</option>
                    <option value="sage">Sage</option>
                    <option value="shimmer">Shimmer</option>
                    <option value="verse">Verse</option>
                </select>
            </div>
        </header>

        <!-- Main Interaction Area -->
        <main>
            <div class="avatar-container">
                <img id="aiAvatar" src="{{ url_for('static', filename='images/avatar.png') }}" alt="AI Avatar" class="ai-avatar">
            </div>
            
            <div class="visualizer-container">
                <div class="glow-ring" id="glowRing"></div>
                <!-- Interactive Mic Button -->
                <button id="micBtn" class="mic-button">
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C10.3431 2 9 3.34315 9 5V11C9 12.6569 10.3431 14 12 14C13.6569 14 15 12.6569 15 11V5C15 3.34315 13.6569 2 12 2Z" fill="currentColor"/>
                        <path d="M19 10V11C19 14.866 15.866 18 12 18C8.13401 18 5 14.866 5 11V10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M12 18V22M12 22H9M12 22H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <p class="instruction">Hold to Talk</p>
        </main>

        <!-- Secondary Controls -->
        <footer>
            <div class="controls">
                <button id="showHistory" class="control-btn" title="View Logs in Console">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 8V12L15 15M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <button id="deleteLogs" class="control-btn" title="Clear Logs">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 7H20M10 11V17M14 11V17M5 7L6 19C6 20.1046 6.89543 21 8 21H16C17.1046 21 18 20.1046 18 19L19 7M9 7V4C9 3.44772 9.44772 3 10 3H14C14.5523 3 15 3.44772 15 4V7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <button id="runStreamlit" class="control-btn run-admin" title="Open Admin Dashboard">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.3246 4.31731C10.751 2.5609 13.249 2.5609 13.6754 4.31731C13.9508 5.45193 15.112 6.04915 16.1245 5.57551C17.7946 4.79428 19.2057 6.20542 18.4245 7.87547C17.9508 8.88796 18.5481 10.0492 19.6827 10.3246C21.4391 10.751 21.4391 13.249 19.6827 13.6754C18.5481 13.9508 17.9508 15.112 18.4245 16.1245C19.2057 17.7946 17.7946 19.2057 16.1245 18.4245C15.112 17.9508 13.9508 18.5481 13.6754 19.6827C13.249 21.4391 10.751 21.4391 10.3246 19.6827C10.0492 18.5481 8.88796 17.9508 7.87547 18.4245C6.20542 19.2057 4.79428 17.7946 5.57551 16.1245C6.04915 15.112 5.45193 13.9508 4.31731 13.6754C2.5609 13.249 2.5609 10.751 4.31731 10.3246C5.45193 10.0492 6.04915 8.88796 5.57551 7.87547C4.79428 6.20542 6.20542 4.79428 7.87547 5.57551C8.88796 6.04915 10.0492 5.45193 10.3246 4.31731Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M15 12C15 13.6569 13.6569 15 12 15C10.3431 15 9 13.6569 9 12C9 10.3431 10.3431 9 12 9C13.6569 9 15 10.3431 15 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
            </div>
        </footer>

        <!-- Hidden Audio Element for Streaming -->
        <audio id="audioPlayer" autoplay></audio>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
